<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Triagem de Artigos</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="styles_triagem.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
 <!-- Menu navbar -->
  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand fs-4 fw-bold main-brand" href="index.html">
        <img src="/images/logo-snowballing.png" alt="Logo" style="height:32px; margin-right:8px;">
        SnowBalling
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-2">
          <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="triagem.html">Initial Analysis</a>
          </li>
          <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="criterios.html" id="linkCriterios">Criteria Applications</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="mb-4">
      <h4 id="titulo-principal">Selected Articles</h4>
    </section>

    <section class="mb-5">
      <h3 class="mb-4 titulo">Summary</h3>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card-resumo">
            <h5>Total Articles</h5>
            <p id="total-artigos">0</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card-resumo">
            <h5>Total Venues</h5>
            <p id="total-venue">0</p>
          </div>
        </div>
      </div>
    </section>

    <section class="mb-5">
      <h3 class="mb-4 subtitulo">Graphics</h3>
      <div class="row gutter">
        <div class="quadro col-md-6">
          <div class="quadro-conteudo">
            <div class="alinhamento-checkbox">
              <label for="checkbox">Select All</label>
              <input type="checkbox" id="checkbox">
            </div>
            <canvas id="graficoAno" height="300"></canvas>
          </div>
        </div>
        <div class="quadro col-md-6">
          <div class="quadro-conteudo">
            <canvas id="graficoVenue" height="300"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const totalArtigosEl = document.getElementById('total-artigos');
    const totalVenueEl = document.getElementById('total-venue');

    function normalizeArticles(data) {
      return data.map(item => ({
        paperId: item.paperId || '',
        title: item.title || "Untitled",
        abstract: item.abstract || "No abstract available",
        year: item.year || "N/A",
        venue: item.venue || (item.publicationVenue && item.publicationVenue.name) || "N/A",
        selecionado: item.selecionado || null
      }));
    }

    const countBy = (arr, key) => arr.reduce((acc, item) => {
      const val = item[key] || "N/A";
      acc[val] = (acc[val] || 0) + 1;
      return acc;
    }, {});

    function fillList(el, obj) {
      if (!el) return;
      el.innerHTML = '';
      Object.entries(obj).sort().forEach(([key, val]) => {
        const li = document.createElement('li');
        li.textContent = `${key}: ${val}`;
        el.appendChild(li);
      });
    }

    function atualizarCoresBarras(anoClicado = null, dadosPorAno) {

      const corDestacada = '#000000'; 
      const corOpaca = 'rgba(0, 0, 0, 0.3)';

      if (!window.chartAno) return;

      if (!dadosPorAno || typeof dadosPorAno !== 'object') {
        console.error('dadosPorAno inválido:', dadosPorAno);
        return;
      }
      
      const anos = Object.keys(dadosPorAno);
      const novasCores = anos.map(ano => {
        if (anoClicado === null) {
          return corDestacada;
        } else if (ano === anoClicado) {
          return corDestacada;
        } else {
          return corOpaca;
        }
      });
      
      window.chartAno.data.datasets[0].backgroundColor = novasCores;
      window.chartAno.update();
    }

    function atualizarResumoEgraficos(artigos) {
      const porAno = countBy(artigos, 'year');
      const porVenue = countBy(artigos, 'venue');
      totalArtigosEl.textContent = artigos.length;
      totalVenueEl.textContent = Object.keys(porVenue).length;

      if (window.chartAno) window.chartAno.destroy();
      if (window.chartVenue) window.chartVenue.destroy();

      let anoSelecionado = null;

      const corNormal = '#000000';

      document.getElementById('checkbox').addEventListener('change', function(e) {
        if (this.checked) {
          anoSelecionado = null;
          atualizarCoresBarras(anoSelecionado, porAno);
        }
      });

      window.chartAno = new Chart(document.getElementById('graficoAno'), {
        type: 'bar',
        data: {
          labels: Object.keys(porAno),
          datasets: [{ 
            data: Object.values(porAno), 
            backgroundColor: Object.keys(porAno).map(() => corNormal)
          }]
        },
        options: { 
          plugins: { legend: { display: false } }, 
          scales: { y: { beginAtZero: true } },
          onClick: (event, elements) => {
            if (elements && elements.length > 0) {
              const elementIndex = elements[0].index;
              const ano = Object.keys(porAno)[elementIndex];
              const quantidade = Object.values(porAno)[elementIndex];
              
              
              anoSelecionado = ano;
              atualizarCoresBarras(anoSelecionado, porAno);
            }
          }
        }
      });

      const cores_hex = [
        '#5D8AA8', '#367588', '#2F4F4F', '#3F7CAC', '#264348', '#004242', '#2C5F71', '#5B8D89', '#628B7B',
        '#436D61', '#1D475C', '#78B2AB', '#509C87', '#47836C', '#2D7452', '#33596F', '#006B5E', '#1F4F4F',
        '#176D6D', '#1A5B6E', '#2E6B6B', '#008080', '#42736E', '#3B7A70', '#206B5E', '#3B6D6D', '#1E5945', '#236B54'
      ];

      window.chartVenue = new Chart(document.getElementById('graficoVenue'), {
        type: 'pie',
        data: {
          labels: Object.keys(porVenue),
          datasets: [{ data: Object.values(porVenue), backgroundColor: cores_hex }]
        },
        options: { plugins: { legend: { position: 'right' } } }
      });
    }

    function carregarArtigosLocal() {
      if (!window.name) {
        alert('No articles found for screening. Please return to the home page and try a new search.');
        return;
      }
      try {
        const dados = JSON.parse(window.name);
        const artigos = normalizeArticles(dados.filter(a => a.selecionado === 'incluir')); // só os incluídos
        atualizarResumoEgraficos(artigos);
      } catch (e) {
        alert('Error loading screening data:  ' + e.message);
      }
    }

    document.addEventListener('DOMContentLoaded', carregarArtigosLocal);

    document.getElementById('linkCriterios').addEventListener('click', function (e) {
      e.preventDefault();

      try {
        const dados = JSON.parse(window.name || '[]');
        const selecionados = dados.filter(a => a.selecionado === 'incluir');
        window.name = JSON.stringify(selecionados);
        window.location.href = 'criterios.html';
      } catch (e) {
        alert('Error preparing data for criteria screen:  ' + e.message);
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
