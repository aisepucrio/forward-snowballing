<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SnowMap - Criteria Application</title>
  <link rel="icon" href="../images/favicon-32x32.png" type="image/x-icon">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles_criterios.css" />

</head>
<body>

  <div id="navbar-component"></div>
  <link rel="stylesheet" href="components/navbar/navbar.css" />

  <script src="components/navbar/navbar.js"></script>
  <script src="/js/criterios.js"></script>

  <main class="mt-5 pt-5">
    <h2 class="mb-4 fw-semibold">Define Inclusion and Exclusion Criteria</h2>
    <h3 id="sub" class = "mb-4 fs-5">Set the logical boundaries for your systematic review. These criteria will be used to
automatically screen abstracts and provide decision support.</h3>

    <form id="criteriosForm">

  <div class="criteria-container">
    <!-- INCLUSION -->
    <div class="criteria-box">
      <label for="inclusao" class="form-label">
        <i class="bi bi-check-circle label-icon inclusion"></i>
        INCLUSION CRITERIA
      </label>

      <div id="inclusaoBox" class="form-control d-flex flex-wrap gap-2" style="min-height: 80px;">
        <input id="inclusaoInput" type="text" class="border-0 flex-grow-1"
          placeholder="Enter inclusion criteria..." style="outline:none;">
      </div>
    </div>

    <!-- EXCLUSION -->
    <div class="criteria-box">
      <label for="exclusao" class="form-label">
        <i class="bi bi-x-circle label-icon exclusion"></i>
        EXCLUSION CRITERIA
      </label>

      <div id="exclusaoBox" class="form-control d-flex flex-wrap gap-2" style="min-height: 80px;">
        <input id="exclusaoInput" type="text" class="border-0 flex-grow-1"
          placeholder="Enter exclusion criteria..." style="outline:none;">
      </div>
    </div>

  </div>

  <button id="analisarBtn" type="submit" class="analisarBtn btn btn-success">
    <i class="bi bi-stars"></i>
    <span id="btnTexto" class="fw-semibold">Apply Criteria</span>
    <span id="btnLoading" class="spinner-border spinner-border-sm d-none"></span>
  </button>

</form>

    <div class="mt-4">
      <p id="statusAnalise" class="text-muted mb-2"></p>
      <div class="progress" style="height: 24px;">
        <div
          id="progressoAnalise"
          class="progress-bar progress-bar-striped progress-bar-animated bg-success"
          role="progressbar"
          style="width: 0%;"
        >
          0%
        </div>
      </div>
    </div>
    <div id="tabelaArtigosContainer" class="mt-4">

      <!-- Título inicial -->
      <h2 id="selectedTitle" class="fw-semibold mb-3">Selected Articles</h2>

      <div id="analysisSection" class="d-none justify-content-between align-items-center mb-3">
        <h2 class="mb-0 fw-semibold">Analysis Results</h2>
        <button id="downloadBtn" type="button" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-box-arrow-up"></i> Export
        </button>
      </div>

      <!-- Tabela -->
      <div class="table-wrapper">
        <table class="custom-table" id="tabela-criterios">
          <thead>
            <tr>
              <th>Research Identity</th>
              <th>Abstract</th>
              <th>Keywords</th>
              <th>Citations</th>
              </tr>
          </thead>
          <tbody id="tabelaArtigosBody"></tbody>
        </table>
      </div>

    </div>
    <div id="resultadoAnalise" data-resultados-raw="" style="display:none;"></div>

  </main>
  
  <div id="footer-component"></div>
  <link rel="stylesheet" href="components/footer/footer.css" />
  <script src="components/footer/footer.js"></script>
  <script src="js/criterios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
