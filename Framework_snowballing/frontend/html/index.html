<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>SnowMap</title>
  <link rel="icon" href="../images/favicon-32x32.png" type="image/x-icon">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles_index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="navbar-component"></div>
  <link rel="stylesheet" href="components/navbar/navbar.css" />

  <script src="components/navbar/navbar.js"></script>
  <script src="/js/index.js"></script>


  <main class="container-fluid px-4">
    <div id="headerContainer" class="text-center mb-4">
      <div class="logotipo mb-10">
        <img src="/images/logo-snowballing.png" alt="Snowballing Logo" style="height: 15%; width: 15%;">
      </div>

      <h1 class="fw-semibold mb-4">SnowMap</h1>
      <p class="text-muted mb-2">The Academic Curator for deep citation mapping and research discovery</p>

      <div class="d-flex justify-content-center mb-3">
        <div class="btn-group" role="group">

          <input type="radio" class="btn-check" name="snowballMode" id="modeForward" value="forward" checked>
          <label class="btn btn-outline-success px-4" for="modeForward">
            <i class="bi bi-arrow-up-right-circle me-1"></i> Citations (Forward)
          </label>

          <input type="radio" class="btn-check" name="snowballMode" id="modeBackward" value="backward">
          <label class="btn btn-outline-success px-4" for="modeBackward">
            <i class="bi bi-arrow-down-left-circle me-1"></i> References (Backward)
          </label>

        </div>
      </div>

      <p class="text-black">Search by <b>DOI</b> or <b>Title</b></p>
    </div>

    <form id="searchForm" class="d-flex justify-content-center mb-4" onsubmit="buscarArtigo(); return false;">

      <div class="d-flex align-items-center shadow-sm" style="background:#f1f1f1;border-radius:20px;padding:8px 12px;">


        <i class="bi bi-search text-muted me-2"></i>


        <input type="text" id="searchInput" placeholder="Enter DOI or Title (e.g., 10.1145/3025453.3025795)" class="form-control border-0 bg-transparent"
          style="box-shadow:none;">


        <button type="submit" class="btn btn-success ms-2 px-4">
          Search
        </button>


      </div>


    </form>


    <div id="loadingSpinner" class="text-center my-4" style="display:none;">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>


    <div id="resultado" class="mt-4"></div>


    <div id="citationsSection" style="display:none;">
    


      <div id="citationsList" class="table-wrapper">

        <div class="table-topbar">
          
          <div class="table-info">
            <span class="table-title">Cited By</span>
          </div>

          <div class="table-actions">
            <button id="dedupBtn" class="btn-export" onclick="openDedupModal()">
              <i class="bi bi-copy"></i>
              See Duplicates
            </button>
            <button id="downloadBtn" class="btn-export">
              <i class="bi bi-download"></i>
              Export
            </button>
            <button id="includeAllBtn" class="btn-export">
              <i class="bi bi-check2-square"></i>
              Include All
            </button>

          </div>

        </div>

        <table class="custom-table" id="tabela-triagem">

          <thead>
            <tr>
              <th>Research Identity</th>
              <th>Abstract</th>
              <th>Keywords</th>
              <th>Citations</th>
              <th>Actions</th>
            </tr>
          </thead>


          <tbody></tbody>

        </table>
      </div>
    </div>
  </main>
  <div id="footer-component"></div>
  <link rel="stylesheet" href="components/footer/footer.css" />
  <script src="components/footer/footer.js"></script>
  <script src="js/index.js"></script>

<div class="modal fade" id="dedupModal" tabindex="-1" aria-labelledby="dedupModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="dedupModalLabel">Duplicate Papers</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="dedupModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="removeDedupSelected()">Remove Selected</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
