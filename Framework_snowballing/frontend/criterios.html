<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snowballing Forward - Criteria Application</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles_criterios.css" />

</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand fs-4 fw-bold main-brand" href="index.html">
        <img src="/images/logo-snowballing.png" alt="Logo" style="height:32px; margin-right:8px;">
        SnowBalling
      </a> 
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-2"> <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="triagem.html">Initial Analysis</a>
          </li>
          <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="criterios.html" id="linkCriterios">Criteria Applications</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="mt-5 pt-5">
    <h1 class="mb-4 fw-semibold">Define Inclusion and Exclusion Criteria</h1>

    <form id="criteriosForm">
      <div class="mb-3">
        <label for="inclusao" class="form-label">Inclusion Criteria</label>
        <div id="inclusaoBox"
          class="form-control d-flex flex-wrap gap-2"
          style="min-height: 80px;"
          data-bs-toggle="tooltip"
          data-bs-placement="top"
          data-bs-custom-class="tooltip-custom"
          title="To add multiple criteria, press ENTER after writing each one.">

          <input id="inclusaoInput" type="text" class="border-0 flex-grow-1" placeholder="Enter inclusion criteria..." style="outline:none;">
        </div>
      </div>

      <div class="mb-3">
        <label for="exclusao" class="form-label">Exclusion Criteria</label>
        <div id="exclusaoBox" class="form-control d-flex flex-wrap gap-2" style="min-height: 80px;">
          <input id="exclusaoInput" type="text" class="border-0 flex-grow-1" placeholder="Enter exclusion criteria..." style="outline:none;">
        </div>
      </div>

      <button id="analisarBtn" type="submit" class="btn btn-primary">
        <span id="btnTexto">Apply Criteria</span>
        <span id="btnLoading" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      </button>
    </form>

    <div class="mt-4">
      <p id="statusAnalise" class="text-muted mb-2"></p>
      <div class="progress" style="height: 24px;">
        <div
          id="progressoAnalise"
          class="progress-bar progress-bar-striped progress-bar-animated bg-success"
          role="progressbar"
          style="width: 0%;"
        >
          0%
        </div>
      </div>
    </div>
    <div id="tabelaArtigosContainer" class="mt-4">

      <!-- Título inicial -->
      <h2 id="selectedTitle" class="fw-semibold mb-3">Selected Articles</h2>

      <div id="analysisSection" class="d-none justify-content-between align-items-center mb-3">
        <h2 class="mb-0 fw-semibold">Analysis Results</h2>
        <button id="downloadBtn" type="button" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-box-arrow-up"></i> Export
        </button>
      </div>

      <!-- Tabela -->
      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover table-striped align-middle mb-0 w-100">
          <thead>
            <tr>
              <th>Title</th>
              <th>Abstract</th>
              <th>Authors</th>
              <th>Year</th>
              <th>Venue</th>
              <th>DOI</th>
              <th>Cited by</th>
            </tr>
          </thead>
          <tbody id="tabelaArtigosBody"></tbody>
        </table>
      </div>

    </div>
    <div id="resultadoAnalise" data-resultados-raw="" style="display:none;"></div>

  </main>

  <script>
    let artigosIncluidos = [];

    function escapeHtml(text) {
      if (text === null || text === undefined) return '-';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatAuthors(authors) {
      if (!authors) return '-';

      if (Array.isArray(authors)) {
        if (authors.length === 0) return '-';
        return authors.map(a => a?.name || a).join('; ');
      }

      if (typeof authors === 'string') return authors;

      return '-';
    }

    function formatDOILink(doi) {
      if (!doi || doi === '-') return '-';
      return `<a href="https://doi.org/${encodeURIComponent(doi)}" target="_blank">${escapeHtml(doi)}</a>`;
    }

    function truncateText(text, maxLength = 100) {
      if (!text) return '-';
      return text.length > maxLength
        ? text.substring(0, maxLength) + '...'
        : text;
    }

    function mostrarTabelaArtigos(artigos) {
      const tbody = document.getElementById('tabelaArtigosBody');

      if (!artigos || artigos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">No articles selected.</td></tr>';
        return;
      }

      tbody.innerHTML = '';

      artigos.forEach((artigo, index) => {

        const tr = document.createElement('tr');

        const titleCell = document.createElement('td');
        titleCell.textContent = artigo.title || '-';

        const abstractCell = document.createElement('td');
        abstractCell.style.cursor = 'pointer';

        abstractCell.innerHTML = `
          <span>${escapeHtml(truncateText(artigo.abstract || '-', 100))}</span><br>
          <small class="text-primary">
            ${artigo.abstractExpanded ? 'Hide abstract' : 'Show abstract'}
          </small>
        `;

        abstractCell.addEventListener('click', () => toggleAbstract(index));


        const authorsCell = document.createElement('td');
        authorsCell.textContent = formatAuthors(artigo.authors);

        const yearCell = document.createElement('td');
        yearCell.textContent = artigo.year || '-';

        const venueCell = document.createElement('td');
        venueCell.textContent = artigo.venue || '-';

        const doiCell = document.createElement('td');
        doiCell.innerHTML = formatDOILink(artigo.doi);

        const citedByCell = document.createElement('td');
        citedByCell.textContent = artigo.citations_count || '-';

        tr.appendChild(titleCell);
        tr.appendChild(abstractCell);
        tr.appendChild(authorsCell);
        tr.appendChild(yearCell);
        tr.appendChild(venueCell);
        tr.appendChild(doiCell);
        tr.appendChild(citedByCell);

        tbody.appendChild(tr);
        if (artigo.abstractExpanded) {
          const abstractRow = document.createElement('tr');
          abstractRow.className = 'table-light';

          const td = document.createElement('td');
          td.colSpan = 7;

          td.innerHTML = `
            <div class="p-3">
              <strong>Full Abstract:</strong>
              <p class="mb-0 mt-2">
                ${escapeHtml(artigo.abstract || 'Abstract unavailable.')}
              </p>
            </div>
  `;

  abstractRow.appendChild(td);
  tbody.appendChild(abstractRow);
}

      });
    }

    function toggleAbstract(index) {
      artigosIncluidos[index].abstractExpanded =
        !artigosIncluidos[index].abstractExpanded;

      mostrarTabelaArtigos(artigosIncluidos);
    }




    window.addEventListener('load', () => {
      try {
        artigosIncluidos = JSON.parse(window.name || '[]').map(a => ({
          ...a,
          abstractExpanded: false
        }));
      } catch {
        artigosIncluidos = [];
      }

      mostrarTabelaArtigos(artigosIncluidos);
    });



    function dividirEmLotes(array, tamanhoLote = 10) {
      const lotes = [];
      for (let i = 0; i < array.length; i += tamanhoLote) {
        lotes.push(array.slice(i, i + tamanhoLote));
      }
      return lotes;
    }

    function prepararArtigosParaAnalise(artigos) {
      return artigos.map(artigo => ({
        title: artigo.title || '',
        abstract: artigo.abstract || ''
      }));
    }

    function mostrarTabelaComResultados(artigos, resultados) {
      const tbody = document.getElementById('tabelaArtigosBody');
      const theadRow = document.querySelector('#tabelaArtigosContainer thead tr');

      if (!artigos || artigos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">No articles selected.</td></tr>';
        return;
      }

      const criteriosSet = new Set();
      resultados.forEach(r => {
        if (r.results) {
          Object.keys(r.results).forEach(c => criteriosSet.add(c));
        }
      });

      const colunas = Array.from(criteriosSet);

      
      while (theadRow.children.length > 7) {
        theadRow.removeChild(theadRow.lastChild);
      }

      colunas.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        th.style.backgroundColor = 'black';
        th.style.color = 'white';
        th.style.textAlign = 'center';
        theadRow.appendChild(th);


      });


      tbody.innerHTML = '';

      artigos.forEach((artigo, index) => {
        const resultado = resultados[index];
        const tr = document.createElement('tr');

        // mesmas colunas antigas
        const titleCell = document.createElement('td');
        titleCell.textContent = artigo.title || '-';

        const abstractCell = document.createElement('td');
        abstractCell.style.cursor = 'pointer';
        abstractCell.innerHTML = `
          <span>${escapeHtml(truncateText(artigo.abstract || '-', 100))}</span><br>
          <small class="text-primary">
            ${artigo.abstractExpanded ? 'Hide abstract' : 'Show abstract'}
          </small>
        `;

abstractCell.addEventListener('click', () => toggleAbstract(index));

        const authorsCell = document.createElement('td');
        authorsCell.textContent = formatAuthors(artigo.authors);

        const yearCell = document.createElement('td');
        yearCell.textContent = artigo.year || '-';

        const venueCell = document.createElement('td');
        venueCell.textContent = artigo.venue || '-';

        const doiCell = document.createElement('td');
        doiCell.innerHTML = formatDOILink(artigo.doi);

        const citedByCell = document.createElement('td');
        citedByCell.textContent = artigo.citations_count || '-';

        tr.appendChild(titleCell);
        tr.appendChild(abstractCell);
        tr.appendChild(authorsCell);
        tr.appendChild(yearCell);
        tr.appendChild(venueCell);
        tr.appendChild(doiCell);
        tr.appendChild(citedByCell);

        colunas.forEach(col => {
          const td = document.createElement('td');

          const valorBruto = resultado?.results?.[col] || '-';
          const valor = String(valorBruto).toLowerCase();

          if (valor === 'sim') {
            td.innerHTML = `<span class="badge bg-success">Yes</span>`;
          } else if (valor === 'não' || valor === 'nao') {
            td.innerHTML = `<span class="badge bg-danger">No</span>`;
          } else if (valor === 'erro') {
            td.innerHTML = `<span class="badge bg-warning text-dark">Error</span>`;
          } else {
            td.textContent = valorBruto;
          }

          td.classList.add('text-center');
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
        if (artigo.abstractExpanded) {
          const abstractRow = document.createElement('tr');
          abstractRow.className = 'table-light';

          const td = document.createElement('td');
          td.colSpan = 7 + colunas.length;

          td.innerHTML = `
            <div class="p-3">
              <strong>Full Abstract:</strong>
              <p class="mb-0 mt-2">
                ${escapeHtml(artigo.abstract || 'Abstract unavailable.')}
              </p>
            </div>
          `;

          abstractRow.appendChild(td);
          tbody.appendChild(abstractRow);
        }

      });
    }


    function jsonParaCSV(resultados) {
      if (!resultados || resultados.length === 0) return '';

      const criteriosSet = new Set();
      resultados.forEach(r => {
        if (r.results) {
          Object.keys(r.results).forEach(c => criteriosSet.add(c));
        }
      });

      const colunas = Array.from(criteriosSet);
      const header = ['Title', ...colunas];
      const linhas = [header.join(',')];

      resultados.forEach(r => {
        const linha = [r.title || ''];
        colunas.forEach(col => {
          let val = r.results?.[col] || '';
          val = String(val);
          if (val.includes(',') || val.includes('"') || val.includes('\n')) {
            val = `"${val.replace(/"/g, '""')}"`;
          }
          linha.push(val);
        });
        linhas.push(linha.join(','));
      });

      return linhas.join('\n');
    }

    async function analisarEmLotes(artigos, criteriosInclusao, criteriosExclusao) {
      const artigosLimpos = prepararArtigosParaAnalise(artigos);
      const tamanhoLote = 10;
      const lotes = dividirEmLotes(artigosLimpos, tamanhoLote);
      const resultadosFinais = [];

      const statusEl = document.getElementById('statusAnalise');
      const progressoEl = document.getElementById('progressoAnalise');

      statusEl.textContent = `Starting analysis... 0/${artigosLimpos.length}`;
      progressoEl.style.width = '0%';
      progressoEl.textContent = '0%';

      for (let i = 0; i < lotes.length; i++) {
        const lote = lotes[i];

        const payload = {
          criteriosInclusao: criteriosInclusao,
          criteriosExclusao: criteriosExclusao,
          artigos: lote
        };

        const res = await fetch('http://localhost:3000/api/articles/analisar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error(`Error analyzing batch ${i + 1}`);
        }

        const resultadosLote = await res.json();
        resultadosFinais.push(...resultadosLote);

        const processados = Math.min((i + 1) * tamanhoLote, artigosLimpos.length);
        const percentual = Math.round((processados / artigosLimpos.length) * 100);

        statusEl.textContent = `Analyzing articles... ${processados}/${artigosLimpos.length}`;
        progressoEl.style.width = `${percentual}%`;
        progressoEl.textContent = `${percentual}%`;
      }

      statusEl.textContent = `Analysis finished: ${artigosLimpos.length}/${artigosLimpos.length}`;
      progressoEl.style.width = '100%';
      progressoEl.textContent = '100%';
      setTimeout(() => {
        document.querySelector('.progress').style.display = 'none';
        statusEl.style.display = 'none';
      }, 800);


      return resultadosFinais;
    }

    document.getElementById('criteriosForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const inclusaoInput = document.getElementById('inclusaoInput');
      const exclusaoInput = document.getElementById('exclusaoInput');

      // Se houver texto nos inputs, cria as tags automaticamente
      if (inclusaoInput.value.trim()) {
        criarTag(document.getElementById('inclusaoBox'), inclusaoInput.value.trim(), 'bg-success');
        inclusaoInput.value = '';
      }

      if (exclusaoInput.value.trim()) {
        criarTag(document.getElementById('exclusaoBox'), exclusaoInput.value.trim(), 'bg-danger');
        exclusaoInput.value = '';
      }

      // Obtém todas as tags
      const inclusao = obterTags('inclusaoBox')
        .map((c, i) => `${i + 1}. ${c}`)
        .join('\n');

      const exclusao = obterTags('exclusaoBox')
        .map((c, i) => `${i + 1}. ${c}`)
        .join('\n');

      const btnTexto = document.getElementById('btnTexto');
      const btnLoading = document.getElementById('btnLoading');
      const analisarBtn = document.getElementById('analisarBtn');

      if (!inclusao && !exclusao) {
        alert('Please fill in at least one of the fields with criteria.');
        return;
      }

      if (artigosIncluidos.length === 0) {
        alert('No included articles to analyze.');
        return;
      }

      // Mostra loading
      btnTexto.classList.add('d-none');
      btnLoading.classList.remove('d-none');
      analisarBtn.disabled = true;

      try {
        const resultados = await analisarEmLotes(
          artigosIncluidos,
          inclusao,
          exclusao
        );
        const divResultado = document.getElementById('resultadoAnalise');
        divResultado.dataset.resultadosRaw = JSON.stringify(resultados);



        document.getElementById('selectedTitle').style.display = 'none';

        document.getElementById('analysisSection').classList.remove('d-none');
        document.getElementById('analysisSection').classList.add('d-flex');

        mostrarTabelaComResultados(artigosIncluidos, resultados);

  
        divResultado.dataset.resultadosRaw = JSON.stringify(resultados);

      } catch (err) {
        alert('Error: ' + err.message);
        const divResultado = document.getElementById('resultadoAnalise');
        divResultado.innerHTML = `<p class="text-danger">${err.message}</p>`;
        divResultado.dataset.resultadosRaw = '';
      } finally {
        btnTexto.classList.remove('d-none');
        btnLoading.classList.add('d-none');
        analisarBtn.disabled = false;
      }
    });
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const divResultado = document.getElementById('resultadoAnalise');
      const resultadosText = divResultado.dataset.resultadosRaw;

      if (!resultadosText) {
        alert('No results available for download.');
        return;
      }

      let resultados;
      try {
        resultados = JSON.parse(resultadosText);
      } catch {
        alert('Error processing results for download.');
        return;
      }

      const csv = jsonParaCSV(resultados);

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'analysis_results.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    });

    function obterTags(containerId) {
      const container = document.getElementById(containerId);
      const tags = container.querySelectorAll('.badge');

      return Array.from(tags).map(tag => {
        return tag.firstChild.textContent.trim();
      });
    }

    function criarTag(container, texto, cor) {
      const input = container.querySelector('input');

      const tagsAtuais = container.querySelectorAll('.badge');
      const indice = tagsAtuais.length + 1;

      const prefixo = container.id === 'inclusaoBox' ? `IC${indice}` : `EC${indice}`;

      const tag = document.createElement('span');
      tag.className = `badge d-flex align-items-center ${container.id === 'inclusaoBox' ? 'ic-tag' : 'ec-tag'}`;
      tag.style.padding = '8px 10px';
      tag.style.fontSize = '0.9rem';

      tag.innerHTML = `
        ${prefixo}: ${texto}
        <button type="button" class="btn-close btn-close-white ms-2" style="font-size:0.6rem;"></button>
      `;

      tag.querySelector('button').addEventListener('click', () => {
        tag.remove();

        const restantes = container.querySelectorAll('.badge');
        restantes.forEach((t, i) => {
          const newPrefix = container.id === 'inclusaoBox' ? `IC${i+1}` : `EC${i+1}`;
          t.childNodes[0].textContent = `${newPrefix}: ${t.textContent.split(': ')[1]}`;
        });

        if (restantes.length === 0) {
          input.placeholder = container.id === 'inclusaoBox' 
            ? 'Enter inclusion criteria...' 
            : 'Enter exclusion criteria...';
        }
      });

      container.insertBefore(tag, input);
      input.placeholder = '';
    }

    function ativarInputTags(inputId, boxId, cor) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(boxId);

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();

          const texto = input.value.trim();
          if (!texto) return;

          criarTag(box, texto, cor);
          input.value = '';
        }
      });
    }

document.addEventListener('DOMContentLoaded', () => {
  ativarInputTags('inclusaoInput', 'inclusaoBox', 'bg-success');
  ativarInputTags('exclusaoInput', 'exclusaoBox', 'bg-danger');

  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tooltipTriggerList.forEach(el => {
  new bootstrap.Tooltip(el);
  });
});
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
