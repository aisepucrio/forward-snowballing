<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snowballing Forward - Criteria Application</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles_criterios.css" />

</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand fs-4 fw-bold main-brand" href="index.html">
        <img src="/images/logo-snowballing.png" alt="Logo" style="height:32px; margin-right:8px;">
        SnowBalling
      </a> 
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-2"> <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="triagem.html">Initial Analysis</a>
          </li>
          <li class="nav-item">
            <a class="nav-link btn-nav-custom" href="criterios.html" id="linkCriterios">Criteria Applications</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-5 pt-5">
    <h1 class="mb-4 fw-semibold">Define Inclusion and Exclusion Criteria</h1>

    <form id="criteriosForm">
      <div class="mb-3">
        <label for="inclusao" class="form-label">Inclusion Criteria</label>
        <div id="inclusaoBox" class="form-control d-flex flex-wrap gap-2" style="min-height: 80px;">
          <input id="inclusaoInput" type="text" class="border-0 flex-grow-1" placeholder="Enter inclusion criteria..." style="outline:none;">
        </div>
      </div>

      <div class="mb-3">
        <label for="exclusao" class="form-label">Exclusion Criteria</label>
        <div id="exclusaoBox" class="form-control d-flex flex-wrap gap-2" style="min-height: 80px;">
          <input id="exclusaoInput" type="text" class="border-0 flex-grow-1" placeholder="Enter exclusion criteria..." style="outline:none;">
        </div>
      </div>

      <button id="analisarBtn" type="submit" class="btn btn-primary">
        <span id="btnTexto">Apply Criteria</span>
        <span id="btnLoading" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      </button>
    </form>

    <div class="mt-4">
      <p id="statusAnalise" class="text-muted mb-2"></p>
      <div class="progress" style="height: 24px;">
        <div
          id="progressoAnalise"
          class="progress-bar progress-bar-striped progress-bar-animated bg-success"
          role="progressbar"
          style="width: 0%;"
        >
          0%
        </div>
      </div>
    </div>

    <hr />

    <div class="d-flex justify-content-between align-items-center mt-4">
      <h2 class="mb-0 fw-semibold">Analysis Results</h2>
      <button id="downloadBtn" type="button" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-box-arrow-up"></i> Export
      </button>
    </div>

    <div id="resultadoAnalise" class="mt-3" data-resultados-raw=""></div>
  </main>

  <script>
    let artigosIncluidos = [];

    window.addEventListener('load', () => {
      try {
        artigosIncluidos = JSON.parse(window.name || '[]');
        if (!Array.isArray(artigosIncluidos)) throw new Error('Not an array');
      } catch (e) {
        console.error('Error parsing window.name data:', e);
        artigosIncluidos = [];
      }
    });

    function dividirEmLotes(array, tamanhoLote = 10) {
      const lotes = [];
      for (let i = 0; i < array.length; i += tamanhoLote) {
        lotes.push(array.slice(i, i + tamanhoLote));
      }
      return lotes;
    }

    function prepararArtigosParaAnalise(artigos) {
      return artigos.map(artigo => ({
        title: artigo.title || '',
        abstract: artigo.abstract || ''
      }));
    }

    function montarTabela(resultados) {
      if (!Array.isArray(resultados) || resultados.length === 0) {
        return '<p class="text-muted">No results available.</p>';
      }

      const criteriosSet = new Set();
      resultados.forEach(r => {
        if (r.Resultados) {
          Object.keys(r.Resultados).forEach(c => criteriosSet.add(c));
        }
      });

      const colunas = Array.from(criteriosSet);

      let html = '<div class="table-responsive"><table class="table table-bordered table-hover align-middle">';
      html += '<thead class="table-dark"><tr><th>Title</th>';

      colunas.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += '</tr></thead><tbody>';

      resultados.forEach(r => {
        html += `<tr><td><strong>${r.title || '(Untitled)'}</strong></td>`;

        colunas.forEach(col => {
          const valorBruto = r.Resultados?.[col] || '-';
          const valor = String(valorBruto).toLowerCase();

          let badge = valorBruto;
          if (valor === 'sim') {
            badge = `<span class="badge bg-success">Yes</span>`;
          } else if (valor === 'não' || valor === 'nao') {
            badge = `<span class="badge bg-danger">No</span>`;
          } else if (valor === 'erro') {
            badge = `<span class="badge bg-warning text-dark">Error</span>`;
          }

          html += `<td class="text-center">${badge}</td>`;
        });

        html += '</tr>';
      });

      html += '</tbody></table></div>';
      return html;
    }

    function jsonParaCSV(resultados) {
      if (!resultados || resultados.length === 0) return '';

      const criteriosSet = new Set();
      resultados.forEach(r => {
        if (r.Resultados) {
          Object.keys(r.Resultados).forEach(c => criteriosSet.add(c));
        }
      });

      const colunas = Array.from(criteriosSet);
      const header = ['Title', ...colunas];
      const linhas = [header.join(',')];

      resultados.forEach(r => {
        const linha = [r.title || ''];
        colunas.forEach(col => {
          let val = r.Resultados?.[col] || '';
          val = String(val);
          if (val.includes(',') || val.includes('"') || val.includes('\n')) {
            val = `"${val.replace(/"/g, '""')}"`;
          }
          linha.push(val);
        });
        linhas.push(linha.join(','));
      });

      return linhas.join('\n');
    }

    async function analisarEmLotes(artigos, criteriosInclusao, criteriosExclusao) {
      const artigosLimpos = prepararArtigosParaAnalise(artigos);
      const tamanhoLote = 10;
      const lotes = dividirEmLotes(artigosLimpos, tamanhoLote);
      const resultadosFinais = [];

      const statusEl = document.getElementById('statusAnalise');
      const progressoEl = document.getElementById('progressoAnalise');

      statusEl.textContent = `Starting analysis... 0/${artigosLimpos.length}`;
      progressoEl.style.width = '0%';
      progressoEl.textContent = '0%';

      for (let i = 0; i < lotes.length; i++) {
        const lote = lotes[i];

        const payload = {
          criteriosInclusao: criteriosInclusao,
          criteriosExclusao: criteriosExclusao,
          artigos: lote
        };

        const res = await fetch('http://localhost:3000/api/articles/analisar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error(`Error analyzing batch ${i + 1}`);
        }

        const resultadosLote = await res.json();
        resultadosFinais.push(...resultadosLote);

        const processados = Math.min((i + 1) * tamanhoLote, artigosLimpos.length);
        const percentual = Math.round((processados / artigosLimpos.length) * 100);

        statusEl.textContent = `Analyzing articles... ${processados}/${artigosLimpos.length}`;
        progressoEl.style.width = `${percentual}%`;
        progressoEl.textContent = `${percentual}%`;
      }

      statusEl.textContent = `Analysis finished: ${artigosLimpos.length}/${artigosLimpos.length}`;
      progressoEl.style.width = '100%';
      progressoEl.textContent = '100%';

      return resultadosFinais;
    }

    document.getElementById('criteriosForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const inclusao = obterTags('inclusaoBox')
        .map((c, i) => `${i + 1}. ${c}`)
        .join('\n');

      const exclusao = obterTags('exclusaoBox')
        .map((c, i) => `${i + 1}. ${c}`)
        .join('\n');
      const btnTexto = document.getElementById('btnTexto');
      const btnLoading = document.getElementById('btnLoading');
      const analisarBtn = document.getElementById('analisarBtn');

      if (!inclusao && !exclusao) {
        alert('Please fill in at least one of the fields with criteria.');
        return;
      }

      if (artigosIncluidos.length === 0) {
        alert('No included articles to analyze.');
        return;
      }

      btnTexto.classList.add('d-none');
      btnLoading.classList.remove('d-none');
      analisarBtn.disabled = true;

      try {
        const resultados = await analisarEmLotes(
          artigosIncluidos,
          inclusao,
          exclusao
        );

        const tabelaHTML = montarTabela(resultados);

        const divResultado = document.getElementById('resultadoAnalise');
        divResultado.innerHTML = tabelaHTML;
        divResultado.dataset.resultadosRaw = JSON.stringify(resultados);

      } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('resultadoAnalise').innerHTML = `<p class="text-danger">${err.message}</p>`;
        document.getElementById('resultadoAnalise').dataset.resultadosRaw = '';
      } finally {
        btnTexto.classList.remove('d-none');
        btnLoading.classList.add('d-none');
        analisarBtn.disabled = false;
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const divResultado = document.getElementById('resultadoAnalise');
      const resultadosText = divResultado.dataset.resultadosRaw;

      if (!resultadosText) {
        alert('No results available for download.');
        return;
      }

      let resultados;
      try {
        resultados = JSON.parse(resultadosText);
      } catch {
        alert('Error processing results for download.');
        return;
      }

      const csv = jsonParaCSV(resultados);

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'analysis_results.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    });

    function obterTags(containerId) {
      const container = document.getElementById(containerId);
      const tags = container.querySelectorAll('.badge');

      return Array.from(tags).map(tag => {
        return tag.firstChild.textContent.trim();
      });
    }

    function criarTag(container, texto, cor) {
      const input = container.querySelector('input');

      const tagsAtuais = container.querySelectorAll('.badge');
      const indice = tagsAtuais.length + 1;

      const prefixo = container.id === 'inclusaoBox' ? `IC${indice}` : `EC${indice}`;

      const tag = document.createElement('span');
      tag.className = `badge d-flex align-items-center ${container.id === 'inclusaoBox' ? 'ic-tag' : 'ec-tag'}`;
      tag.style.padding = '8px 10px';
      tag.style.fontSize = '0.9rem';

      tag.innerHTML = `
        ${prefixo}: ${texto}
        <button type="button" class="btn-close btn-close-white ms-2" style="font-size:0.6rem;"></button>
      `;

      tag.querySelector('button').addEventListener('click', () => {
        tag.remove();

        const restantes = container.querySelectorAll('.badge');
        restantes.forEach((t, i) => {
          const newPrefix = container.id === 'inclusaoBox' ? `IC${i+1}` : `EC${i+1}`;
          t.childNodes[0].textContent = `${newPrefix}: ${t.textContent.split(': ')[1]}`;
        });

        if (restantes.length === 0) {
          input.placeholder = container.id === 'inclusaoBox' 
            ? 'Enter inclusion criteria and press ENTER...' 
            : 'Enter exclusion criteria and press ENTER...';
        }
      });

      container.insertBefore(tag, input);
      input.placeholder = '';
    }

    function ativarInputTags(inputId, boxId, cor) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(boxId);

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();

          const texto = input.value.trim();
          if (!texto) return;

          criarTag(box, texto, cor);
          input.value = '';
        }
      });
    }

document.addEventListener('DOMContentLoaded', () => {
  ativarInputTags('inclusaoInput', 'inclusaoBox', 'bg-success');
  ativarInputTags('exclusaoInput', 'exclusaoBox', 'bg-danger');
});
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
